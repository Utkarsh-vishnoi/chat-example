<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Socket.IO chat</title>
  <style>
      body { 
        margin: 0; 
        padding-bottom: 3rem; 
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
      }

      /* Slightly increased height to accommodate the textarea */
      #form { 
        background: rgba(0, 0, 0, 0.15); 
        padding: 0.25rem; 
        position: fixed; 
        bottom: 0; 
        left: 0; 
        right: 0; 
        display: flex; 
        height: 4rem; 
        box-sizing: border-box; 
        backdrop-filter: blur(10px); 
      }
      
      /* Styled the textarea to look native but function securely */
      #input { 
        border: none; 
        padding: 0.75rem 1rem; 
        flex-grow: 1; 
        border-radius: 1rem; 
        margin: 0.25rem; 
        resize: none; 
        font-family: inherit;
      }
      #input:focus { outline: none; }
      #form > button { 
        background: #333; 
        border: none; 
        padding: 0 1rem; 
        margin: 0.25rem; 
        border-radius: 3px; 
        outline: none; 
        color: #fff; 
        cursor: pointer;
      }

      #messages { list-style-type: none; margin: 0; padding: 0; }
      
      /* Crucial CSS for multi-line and code blocks */
      #messages > li { 
        padding: 0.5rem 1rem; 
        white-space: pre-wrap;    /* Preserves newlines and spaces */
        word-break: break-word;   /* Prevents long unbroken lines from overflowing */
        font-family: monospace;   /* Ideal for copying/pasting code snippets */
      }
      #messages > li:nth-child(odd) { background: #efefef; }
  </style>
</head>
<body>
  <ul id="messages"></ul>
  <form id="form" action="">
    <textarea id="input" autocomplete="off" placeholder="Type or paste code... (Shift+Enter for new line)"></textarea>
    <button>Send</button>
  </form>
  <script src="/socket.io/socket.io.js"></script>
  <script>
    let counter = 0;

    const socket = io({
      auth: {
        serverOffset: 0
      },
      ackTimeout: 10000,
      retries: 3,
    });

    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const messages = document.getElementById('messages');

    // Handle Enter key for sending, and Shift+Enter for adding new lines
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault(); // Stop the default newline action
        // Programmatically trigger the form submit event
        form.dispatchEvent(new Event('submit', { cancelable: true, bubbles: true }));
      }
    });

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      // Ensure we aren't sending empty strings or just empty newlines
      if (input.value.trim()) {
        const clientOffset = `${socket.id}-${counter++}`;
        socket.emit('chat message', input.value, clientOffset);
        input.value = '';
      }
    });

    socket.on('chat message', (msg, serverOffset) => {
      const item = document.createElement('li');
      item.textContent = msg;
      messages.appendChild(item);
      window.scrollTo(0, document.body.scrollHeight);
      socket.auth.serverOffset = serverOffset;
    });
  </script>
</body>
</html>
